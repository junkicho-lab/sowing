# Cross-platform 빌드 검증 — macOS / Linux / Windows
#
# 외부 리소스 (Apple Developer 인증서 / Inno Setup 등) 없이 *동작 검증* 만:
#   - Ruby 설치 → bundle install → spec 통과
#   - bin/sowing-doctor 무오류
#   - 패키지된 ZIP artifact 업로드 (서명 없음, 내부 테스트용)
#
# 정식 release 는 .github/workflows/release.yml (signing/notarization 추가 필요)

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ["3.3"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: DB 셋업
        run: bundle exec rake db:setup
        env:
          SOWING_ENV: test

      - name: spec
        run: bundle exec rspec --format progress
        env:
          SOWING_ENV: test

      - name: lint
        run: bundle exec standardrb
        if: matrix.os != 'windows-latest'  # standardrb 가 win 경로 처리 이슈 가능

      - name: doctor (소스 모드)
        run: bundle exec bin/sowing-doctor
        if: matrix.os != 'windows-latest'  # doctor 일부 출력이 win shell 인코딩과 충돌 가능 — 추후 검증

      # ─── 패키지 ZIP — 사용자 다운로드용 (서명 없음) ───
      - name: 패키지 ZIP (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          NAME=sowing-${{ matrix.os }}-source
          # Gemfile.lock + .bundle 포함 → 받은 사용자가 즉시 bundle install 가능
          tar -czf dist/${NAME}.tar.gz \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./tmp' \
            --exclude='./log' \
            --exclude='./dist' \
            --exclude='./.claude' \
            --exclude='./node_modules' \
            .
          ls -lh dist/

      - name: 패키지 ZIP (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -Force dist
          $name = "sowing-windows-source"
          Compress-Archive -Path * -DestinationPath "dist/$name.zip" `
            -Force `
            -CompressionLevel Optimal
          Get-ChildItem dist
        shell: pwsh

      - name: artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sowing-${{ matrix.os }}
          path: dist/
          retention-days: 14

  docker:
    name: Docker 이미지 빌드 검증
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 (cache 활용)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sowing:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 컨테이너 헬스체크
        run: |
          docker run -d --name sowing-test -p 48723:48723 sowing:ci
          # 부팅 대기 (rake db:setup + rackup boot)
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:48723/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "✅ 컨테이너 정상 부팅"
              exit 0
            fi
            sleep 2
          done
          echo "❌ 컨테이너 부팅 실패 — 로그:"
          docker logs sowing-test
          exit 1

      - name: cleanup
        if: always()
        run: docker rm -f sowing-test 2>/dev/null || true
