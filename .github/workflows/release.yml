# Tag-triggered release — v* 태그 push 시 자동 실행
#
# 동작:
#   1. cross-platform source artifact 빌드 (macOS/Ubuntu/Windows)
#   2. Docker 이미지 빌드 + GHCR push (ghcr.io/junkicho-lab/sowing:VERSION + :latest)
#   3. SHA256 체크섬 생성
#   4. GitHub Release 생성 + 모든 artifact 첨부
#
# 트리거: git tag -a v0.1.0 -m "..." && git push origin v0.1.0
#
# 외부 리소스 없이 동작 (signing/notarization 없음 — KNOWN_ISSUES.md 명시).
# macOS DMG / Windows MSI / Linux AppImage 정식 인스톨러는 외부 리소스 확보 후 추가.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual release tag (예: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write       # GitHub Release 생성용
  packages: write       # GHCR push 용

jobs:
  source-artifacts:
    name: source artifact / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows 는 ruby/setup-ruby 가 windows-latest + 3.3 조합에서 종종 실패 —
        # Windows 사용자는 WSL2/Docker/sowing-install 우회 권장 (README + packaging/README).
        # 정식 Windows MSI 인스톨러 (W8-T04) 는 외부 리소스 (Inno Setup) 확보 후.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: 버전 추출
        id: version
        shell: bash
        run: |
          VERSION="$(ruby -r ./lib/sowing/version -e 'print Sowing::VERSION')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Sowing version: $VERSION"

      - name: spec (release gate)
        run: bundle exec rspec --format progress
        env:
          SOWING_ENV: test

      - name: lint (release gate)
        if: matrix.os != 'windows-latest'
        run: bundle exec standardrb

      - name: source 패키징 (Linux/macOS — tar.gz)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          NAME="sowing-${{ steps.version.outputs.version }}-${{ matrix.os }}"
          tar -czf "dist/${NAME}.tar.gz" \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./tmp' \
            --exclude='./log' \
            --exclude='./dist' \
            --exclude='./.claude' \
            --exclude='./node_modules' \
            --exclude='./.bundle' \
            --exclude='./vendor/bundle' \
            .
          # SHA256 체크섬
          if [ "$(uname -s)" = "Darwin" ]; then
            shasum -a 256 "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
          else
            sha256sum "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"
          fi
          ls -lh dist/

      - name: source 패키징 (Windows — zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $name = "sowing-${{ steps.version.outputs.version }}-${{ matrix.os }}"
          $exclude = @('.git','.github','tmp','log','dist','.claude','node_modules','.bundle','vendor')
          Get-ChildItem -Path . -Exclude $exclude |
            Compress-Archive -DestinationPath "dist/$name.zip" -CompressionLevel Optimal -Force
          # SHA256
          $hash = Get-FileHash "dist/$name.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $name.zip" | Out-File -FilePath "dist/$name.zip.sha256" -Encoding ASCII
          Get-ChildItem dist

      - name: artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ matrix.os }}
          path: dist/
          retention-days: 90

  docker-image:
    name: Docker 이미지 (GHCR push)
    runs-on: ubuntu-latest
    needs: source-artifacts
    steps:
      - uses: actions/checkout@v4

      - name: 버전 추출
        id: version
        run: |
          VERSION="$(ruby -r ./lib/sowing/version -e 'print Sowing::VERSION')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 메타데이터
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=Sowing
            org.opencontainers.image.description=한국 교사용 로컬 우선 노트 도구 — 마크다운 SoT, 옵시디언 호환, LLM 합성 12종
            org.opencontainers.image.licenses=MIT

      - name: 빌드 + push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 컨테이너 헬스체크
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          docker run -d --name sowing-rel -p 48723:48723 "$IMAGE"
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:48723/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "✅ 이미지 정상 부팅"
              docker rm -f sowing-rel
              exit 0
            fi
            sleep 2
          done
          echo "❌ 이미지 부팅 실패 — 로그:"
          docker logs sowing-rel
          docker rm -f sowing-rel
          exit 1

  github-release:
    name: GitHub Release 생성
    runs-on: ubuntu-latest
    needs: [source-artifacts, docker-image]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 버전·태그 추출
        id: version
        run: |
          VERSION="$(ruby -r ./lib/sowing/version -e 'print Sowing::VERSION')"
          # 태그 push 면 GITHUB_REF 가 "refs/tags/v0.1.0" — 그대로 사용
          # workflow_dispatch 면 input.tag 사용
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 모든 artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: artifact 평탄화
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) \
            -exec mv {} release-files/ \;
          ls -lh release-files/

      - name: CHANGELOG 추출 (해당 버전 섹션) + 설치 경로 안내
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # CHANGELOG.md 에서 [VERSION] 섹션만 추출 — awk
          awk -v v="$VERSION" '
            /^## \['v'\]/  { capturing=1; print; next }
            /^## \[/       { if (capturing) exit }
            /^## Phase/    { if (capturing) exit }
            capturing      { print }
          ' CHANGELOG.md > release-notes.md
          # 최소 안전장치 — 비어 있으면 placeholder
          if [ ! -s release-notes.md ]; then
            echo "v$VERSION 릴리스 — 자세한 내용은 CHANGELOG.md 참조." > release-notes.md
          fi
          # 설치 경로 안내 추가 — 별도 임시 파일로 분리 (heredoc 들여쓰기 yaml 충돌 회피)
          INSTALL_NOTE=$(mktemp)
          {
            echo ""
            echo "## 설치 경로 (4 가지)"
            echo ""
            echo "### Docker (가장 빠름)"
            echo '```sh'
            echo "git clone https://github.com/$REPO.git"
            echo "cd sowing"
            echo "docker compose up -d"
            echo '```'
            echo "또는 GHCR 이미지 직접:"
            echo '```sh'
            echo "docker run -d -p 48723:48723 -v ~/Documents/SowingVault:/vault \\"
            echo "  ghcr.io/$REPO:$VERSION"
            echo '```'
            echo ""
            echo "### 한 줄 스크립트 (Ruby 3.3+)"
            echo '```sh'
            echo "curl -fsSL https://raw.githubusercontent.com/$REPO/main/bin/sowing-install | bash"
            echo '```'
            echo ""
            echo "### 소스 ZIP / tar.gz"
            echo '아래 첨부 파일 다운로드 → `bundle install && bundle exec rake db:setup && bin/sowing dev`'
            echo ""
            echo "### 무결성 검증"
            echo '각 `.tar.gz` / `.zip` 마다 `.sha256` 체크섬 첨부:'
            echo '```sh'
            echo "shasum -a 256 -c sowing-$VERSION-ubuntu-latest.tar.gz.sha256"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "자세한 변경사항: [CHANGELOG.md](https://github.com/$REPO/blob/main/CHANGELOG.md)"
          } > "$INSTALL_NOTE"
          cat "$INSTALL_NOTE" >> release-notes.md
          rm -f "$INSTALL_NOTE"

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }} — Sowing 첫 정식 release"
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: false
          make_latest: true
