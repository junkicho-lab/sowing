# Sowing 🌱 — Docker Compose (가장 빠른 셋업)
#
# 사용:
#   docker compose up -d              # 백그라운드 실행
#   docker compose logs -f            # 로그 추적
#   docker compose down               # 종료
#
# 기본 vault 위치: ./vault (호스트의 현재 디렉토리)
#   다른 위치를 쓰려면 .env 파일에 SOWING_VAULT_HOST=/your/path 설정

services:
  sowing:
    build: .
    image: sowing:latest
    container_name: sowing
    restart: unless-stopped
    ports:
      - "127.0.0.1:48723:48723"  # 로컬 우선 — 외부 노출 X
    volumes:
      - "${SOWING_VAULT_HOST:-./vault}:/vault"
      - sowing-data:/data
    environment:
      SOWING_ENV: production
      SOWING_VAULT: /vault
      SOWING_DATA_DIR: /data
      PORT: 48723
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD", "ruby", "-e", "require 'net/http'; Net::HTTP.get(URI('http://127.0.0.1:48723/health'))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sowing-data:
    driver: local
